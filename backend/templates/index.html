<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arcade Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<style>
    body {
        background: #000;
        font-family: 'Press Start 2P', monospace;
        color: #00f6ff;
        text-align: center;
        padding: 20px;
        overflow-x: hidden;
        position: relative;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: linear-gradient(transparent 0%, rgba(0,255,255,0.05) 1px),
                    linear-gradient(90deg, transparent 0%, rgba(0,255,255,0.05) 1px);
        background-size: 40px 40px;
        animation: gridMove 10s linear infinite;
        z-index: -2;
    }

    @keyframes gridMove {
        from { background-position: 0 0; }
        to { background-position: 40px 40px; }
    }

    .scanlines {
        pointer-events: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.03) 0,
            rgba(255,255,255,0.03) 1px,
            transparent 2px,
            transparent 4px
        );
        animation: flicker 0.1s infinite;
        z-index: 9999;
    }

    @keyframes flicker {
        0% { opacity: 0.25; }
        50% { opacity: 0.3; }
        100% { opacity: 0.25; }
    }

    h1 {
        font-size: 28px;
        margin-top: 40px;
        color: #00e8ff;
        text-shadow: 0 0 8px cyan, 0 0 20px #00ffee;
        animation: glowPulse 2s alternate infinite;
    }

    @keyframes glowPulse {
        0% { text-shadow: 0 0 5px cyan; }
        100% { text-shadow: 0 0 25px cyan; }
    }

    #leaderboard {
        list-style: none;
        max-width: 550px;
        margin: 40px auto;
        padding: 0;
    }

    li {
        background: rgba(0, 255, 234, 0.1);
        border: 2px solid #00ffee;
        padding: 15px;
        margin: 12px 0;
        border-radius: 10px;
        font-size: 14px;
        box-shadow: 0 0 10px #00ffee;
        transition: transform .2s, background .2s;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn .5s forwards;
    }

    li:hover {
        transform: scale(1.05);
        background: rgba(0, 255, 234, 0.2);
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .shake {
        animation: shake 0.4s ease;
    }

    @keyframes shake {
        0% { transform: translateX(0); }
        20% { transform: translateX(-4px); }
        40% { transform: translateX(4px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
        100% { transform: translateX(0); }
    }

    .rank-1 { border-color: gold; box-shadow: 0 0 18px gold; }
    .rank-2 { border-color: silver; box-shadow: 0 0 18px silver; }
    .rank-3 { border-color: #cd7f32; box-shadow: 0 0 18px #cd7f32; }
</style>
</head>

<body>

<div class="scanlines"></div>

<h1>🏆 ARCADE LEADERBOARD 🕹️</h1>

<ul id="leaderboard"></ul>

<script>
const socket = io(window.location.origin);

function renderLeaderboard(data) {
    const list = document.getElementById('leaderboard');
    list.innerHTML = '';

    data.forEach((item, index) => {
        const li = document.createElement('li');

        li.classList.add(`rank-${index + 1}`);
        li.style.animationDelay = (index * 0.09) + "s";

        li.textContent = `${index + 1}. ${item.user} — ${item.score} pts (at ${item.timestamp})`;

        if (index === 0) {
            li.classList.add("shake");
        }

        list.appendChild(li);
    });
}

socket.on("update_leaderboard", data => {
    renderLeaderboard(data);
});
</script>

</body>
</html>
